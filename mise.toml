[tools]
dotnet = "latest"

[tasks.run]
description = "Run a job defined in a YAML configuration file"
run = "dotnet run --project src/Orca.Tool/ -- run \"$@\""

[tasks.cleanup]
description = "Tear down everything created by a run command"
run = "dotnet run --project src/Orca.Tool/ -- cleanup \"$@\""

[tasks.info]
description = "Display the current state of a job"
run = "dotnet run --project src/Orca.Tool/ -- info \"$@\""

[tasks.auth-pat]
description = "Authenticate with a Personal Access Token"
run = "dotnet run --project src/Orca.Tool/ -- auth pat \"$@\""

[tasks.auth-app]
description = "Authenticate with a GitHub App"
run = "dotnet run --project src/Orca.Tool/ -- auth app \"$@\""

[tasks.auth-create-app]
description = "Create a GitHub App and generate credentials for authentication"
run = "dotnet run --project src/Orca.Tool/ -- auth create-app \"$@\""

[tasks.example_validate]
description = "Run the full orcai validation suite against the fixture YAML"
run = "ORCAI_BIN=./src/OrcAI.Tool/bin/Debug/net10.0/orcai dotnet fsi validation/validate.fsx"

[tasks.example_cleanup]
description = "Run orcai cleanup against the fixture YAML"
run = "ORCAI_BIN=./src/OrcAI.Tool/bin/Debug/net10.0/orcai dotnet fsi validation/cleanup.fsx"